version: '3.8'

# ============================================================
# Mini-Drop — 完整 docker-compose
# 一键启动：docker compose up -d --build
#
# 服务启动顺序（由 depends_on + healthcheck 保证）：
#   postgres + minio  →  minio_init
#   minio_init done   →  drop_server
#   drop_server up    →  apiserver + analysis + drop_agent
#   apiserver up      →  web_frontend
#
# 火焰图访问：浏览器打开 http://localhost
# MinIO 控制台：http://localhost:9001  用户名/密码：drop/dropdrop
# ============================================================

# LLM 配置从宿主机 .env 文件读取（不提交到 git）：
#   LLM_API_KEY=sk-xxx
#   LLM_BASE_URL=https://api.apifast.tech/v1
#   LLM_MODEL=gemini-1.5-flash

services:

  # ── 基础设施 ────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: drop
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d drop"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: drop
      MINIO_ROOT_PASSWORD: dropdrop
    ports:
      - "9000:9000"   # S3 API — 浏览器通过 localhost:9000 访问预签名 URL
      - "9001:9001"   # Web 控制台
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 drop dropdrop &&
        mc mb local/drop --ignore-existing &&
        echo '[minio_init] bucket drop is ready'
      "
    restart: on-failure

  # ── drop_server（gRPC 服务端）────────────────────────────────────────────────

  drop_server:
    build:
      context: ./drop
      dockerfile: Dockerfile
    image: minidrop-drop:latest
    command: ["/usr/local/bin/drop_server"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # FetchConfig 返回给 agent 的 MinIO 地址（容器内互通用 minio:9000）
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "drop"
      MINIO_SECRET_KEY: "dropdrop"
      MINIO_BUCKET: "drop"
      # NotifyApiserver 使用此地址注册 agent
      APISERVER_URL: "http://apiserver:8191"
    ports:
      - "50051:50051"   # 暴露到宿主机方便调试；生产可移除
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ss -tlnp | grep -q ':50051' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── drop_agent（采集端）─────────────────────────────────────────────────────

  drop_agent:
    image: minidrop-drop:latest   # 与 drop_server 共用同一镜像
    command: ["/usr/local/bin/drop_agent"]
    depends_on:
      drop_server:
        condition: service_healthy
      apiserver:
        condition: service_healthy
    environment:
      APISERVER_URL: "http://apiserver:8191"
    volumes:
      # 挂载宿主机 /proc /sys /etc — perf 需要读取内核符号表
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /etc/localtime:/etc/localtime:ro
      # 直接挂载宿主机"真实"的 perf 二进制（不是 /usr/bin/perf 这个软链接，是链接
      # 最终指向的那个 ELF 文件）。HOST_PERF_PATH 由启动前的 shell 命令动态算出：
      #   export HOST_PERF_PATH=$(readlink -f $(which perf))
      # 这样不管宿主机是 generic 内核还是 hwe 内核、版本号是多少，都不需要改这份文件。
      - ${HOST_PERF_PATH:-/usr/bin/perf}:/usr/bin/perf:ro
    # --pid=host: agent 可以看到宿主机所有进程（按 PID 采集）
    pid: "host"
    # cap_add 是 perf 运行所需的最小权限集合；privileged 已经包含这些能力，
    # 这里显式列出是为了将来想去掉 privileged 时（最小权限原则）随手就能切换。
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    # privileged: perf 需要 CAP_PERFMON / CAP_SYS_ADMIN，privileged 一次性授予，
    # 比逐个排查 capability 更省时间，演示截止前优先稳妥。
    privileged: true
    restart: unless-stopped

  # ── apiserver（HTTP + gRPC 客户端）──────────────────────────────────────────

  apiserver:
    build:
      context: ./apiserver
      dockerfile: Dockerfile
    image: minidrop-apiserver:latest
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      drop_server:
        condition: service_healthy
    environment:
      # 覆盖 apiserver.yaml 里的 storage.presign_endpoint：浏览器和 Docker 不在同一台机器时
      # （比如本项目这种 Windows 浏览器访问 Ubuntu 虚拟机的场景），在 .env 里设置
      # MINIO_PRESIGN_HOST=<可访问的IP>:9000；同机场景不用设置，默认 localhost:9000。
      STORAGE_PRESIGN_ENDPOINT: "${MINIO_PRESIGN_HOST:-localhost:9000}"
    volumes:
      # 挂载 Docker 版配置文件（使用服务名而非 localhost）
      - ./apiserver/apiserver.yaml.example:/app/apiserver.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8191/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── analysis（Python 分析 Worker）───────────────────────────────────────────

  analysis:
    build:
      context: ./analysis
      dockerfile: Dockerfile
    image: minidrop-analysis:latest
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PG_DSN: "host=postgres user=postgres password=dev dbname=drop port=5432 sslmode=disable"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "drop"
      MINIO_SECRET_KEY: "dropdrop"
      MINIO_BUCKET: "drop"
      MINIO_SECURE: "false"
      # LLM 配置从宿主机 .env 读取（文件存在则生效，不存在则 AI 建议为空）
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-}"
      LLM_MODEL: "${LLM_MODEL:-gemini-1.5-flash}"
    # perf script 需要读取 perf.data 的内核符号（分析在容器内完成，无需 --pid=host）
    volumes:
      - /proc:/proc:ro
      - /sys/kernel/debug:/sys/kernel/debug:ro
      # 同 drop_agent：挂载宿主机真实 perf 二进制，路径由 HOST_PERF_PATH 动态解析。
      - ${HOST_PERF_PATH:-/usr/bin/perf}:/usr/bin/perf:ro
    privileged: true
    restart: unless-stopped

  # ── web_frontend（Nginx + React 构建产物）───────────────────────────────────

  web_frontend:
    build:
      context: ./web_frontend
      dockerfile: Dockerfile
    image: minidrop-web:latest
    depends_on:
      apiserver:
        condition: service_healthy
    ports:
      - "80:80"   # 浏览器入口：http://localhost
    restart: unless-stopped

# ── 持久化卷 ────────────────────────────────────────────────────────────────
volumes:
  pg_data:
  minio_data:
