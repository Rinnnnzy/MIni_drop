version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: drop
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: drop
      MINIO_ROOT_PASSWORD: dropdrop
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  drop_server:
    build: ./drop
    command: ["./drop_server", "--port", "50051"]
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy

  drop_agent:
    build: ./drop
    command: ["./drop_agent", "--config", "/etc/drop/config.json"]
    network_mode: host
    privileged: true
    pid: host
    cap_add:
      - SYS_ADMIN
      - PERFMON
    depends_on:
      - drop_server

  apiserver:
    build: ./apiserver
    ports:
      - "8191:8191"
    environment:
      DROP_GRPC: "drop_server:50051"
      PG_DSN: "host=postgres user=postgres password=dev dbname=drop sslmode=disable"
      S3_ENDPOINT: "minio:9000"
      S3_ACCESS_KEY: "drop"
      S3_SECRET_KEY: "dropdrop"
      S3_BUCKET: "drop"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      drop_server:
        condition: service_started

  web_frontend:
    build: ./web_frontend
    ports:
      - "80:80"
    environment:
      HOST_URL: "http://localhost:8191"
    depends_on:
      - apiserver
