version: '3.8'

# ============================================================
# Mini-Drop docker-compose
# 第一版（Day 1）：仅包含基础存储服务
#   - postgres  : 业务数据库
#   - minio     : 对象存储（替代腾讯云 COS）
#   - minio_init: 自动创建 bucket，启动一次后退出
#
# 后续各天会依次追加：
#   Day 3 → drop_server
#   Day 3 → drop_agent
#   Day 4 → apiserver
#   Day 6 → web_frontend
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL 14：存储所有业务数据（任务、Agent、用户）
  # ----------------------------------------------------------
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: drop
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data   # 数据持久化，重启不丢失
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d drop"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ----------------------------------------------------------
  # MinIO：对象存储，保存 perf.data 和火焰图 SVG
  # 管理控制台：http://localhost:9001  用户名/密码：drop/dropdrop
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: drop
      MINIO_ROOT_PASSWORD: dropdrop
    ports:
      - "9000:9000"   # S3 API 端口（Agent 和 Analyzer 上传/下载文件用）
      - "9001:9001"   # Web 控制台端口
    volumes:
      - minio_data:/data                   # 数据持久化
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ----------------------------------------------------------
  # minio_init：MinIO 启动后自动创建 "drop" bucket
  # 这是一次性任务，创建完就退出（不会一直跑）
  # ----------------------------------------------------------
  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 drop dropdrop &&
        mc mb local/drop --ignore-existing &&
        echo '[minio_init] bucket drop is ready'
      "
    restart: on-failure   # 如果 minio 还没就绪就失败了，会自动重试

# ----------------------------------------------------------
# 数据卷：docker 管理的持久化存储
# 删除容器后数据依然保留，除非手动执行 docker volume prune
# ----------------------------------------------------------
volumes:
  pg_data:
  minio_data:
